<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Grain texture -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Card background blur / glass -->
    <filter id="cardBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>

    <!-- Green glow for lines -->
    <filter id="lineGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow behind cards -->
    <filter id="cardAura" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Green orb glow -->
    <filter id="orbGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>

    <!-- Drop shadow for cards -->
    <filter id="cardShadow" x="-15%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <!-- Gradient for graph line -->
    <linearGradient id="graphGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#02cc81" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#02cc81" stop-opacity="1"/>
    </linearGradient>

    <!-- Graph fill gradient -->
    <linearGradient id="graphFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#02cc81" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#02cc81" stop-opacity="0"/>
    </linearGradient>

    <!-- Card glass gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>

    <!-- Dashboard card shine gradient -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip paths -->
    <clipPath id="dashClip">
      <rect x="0" y="0" width="360" height="220" rx="16"/>
    </clipPath>
    <clipPath id="profileClip">
      <rect x="0" y="0" width="208" height="148" rx="14"/>
    </clipPath>
    <clipPath id="invoiceClip">
      <rect x="0" y="0" width="196" height="240" rx="14"/>
    </clipPath>

    <!-- Avatar gradient -->
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02cc81" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a8f5e" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Node pulse -->
    <radialGradient id="nodePulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#02cc81" stop-opacity="1"/>
      <stop offset="100%" stop-color="#02cc81" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Background ─────────────────────────────────────────── -->
  <rect width="1200" height="675" fill="#0e0e0e"/>
  <!-- Subtle darker vignette corners -->
  <radialGradient id="bgGrad" cx="50%" cy="50%" r="65%">
    <stop offset="0%" stop-color="#181818"/>
    <stop offset="100%" stop-color="#0a0a0a"/>
  </radialGradient>
  <rect width="1200" height="675" fill="url(#bgGrad)"/>

  <!-- Grain overlay -->
  <rect width="1200" height="675" fill="#888888" opacity="0.045" filter="url(#grain)"/>

  <!-- ── Ambient glow orbs ─────────────────────────────────── -->
  <ellipse cx="680" cy="310" rx="280" ry="200" fill="#02cc81" opacity="0.055" filter="url(#orbGlow)"/>
  <ellipse cx="380" cy="450" rx="180" ry="140" fill="#02cc81" opacity="0.03" filter="url(#orbGlow)"/>
  <ellipse cx="950" cy="200" rx="160" ry="120" fill="#02cc81" opacity="0.04" filter="url(#orbGlow)"/>

  <!-- Grid dots pattern (very subtle) -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.7" fill="#ffffff" opacity="0.07"/>
  </pattern>
  <rect width="1200" height="675" fill="url(#dots)"/>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- CONNECTING NEON LINES (drawn first so cards appear on top) -->
  <!-- ─────────────────────────────────────────────────────── -->

  <!-- Line: Dashboard → Customer Profile -->
  <path d="M 645 290 C 700 260, 730 230, 770 238" stroke="#02cc81" stroke-width="1" fill="none" opacity="0.9" filter="url(#lineGlow)"/>
  <path d="M 645 290 C 700 260, 730 230, 770 238" stroke="#02cc81" stroke-width="0.5" fill="none" opacity="0.5"/>

  <!-- Line: Dashboard → Invoice -->
  <path d="M 648 360 C 700 380, 720 400, 760 418" stroke="#02cc81" stroke-width="1" fill="none" opacity="0.85" filter="url(#lineGlow)"/>
  <path d="M 648 360 C 700 380, 720 400, 760 418" stroke="#02cc81" stroke-width="0.5" fill="none" opacity="0.45"/>

  <!-- Connection nodes (glowing dots at connection points) -->
  <circle cx="645" cy="290" r="5" fill="#02cc81" opacity="0.9" filter="url(#lineGlow)"/>
  <circle cx="645" cy="290" r="2.5" fill="#ffffff" opacity="0.95"/>

  <circle cx="648" cy="360" r="5" fill="#02cc81" opacity="0.9" filter="url(#lineGlow)"/>
  <circle cx="648" cy="360" r="2.5" fill="#ffffff" opacity="0.95"/>

  <circle cx="770" cy="238" r="4" fill="#02cc81" opacity="0.85" filter="url(#lineGlow)"/>
  <circle cx="770" cy="238" r="2" fill="#ffffff" opacity="0.9"/>

  <circle cx="760" cy="418" r="4" fill="#02cc81" opacity="0.85" filter="url(#lineGlow)"/>
  <circle cx="760" cy="418" r="2" fill="#ffffff" opacity="0.9"/>

  <!-- Extra subtle lines between minor nodes -->
  <path d="M 860 348 C 875 380, 862 400, 858 418" stroke="#02cc81" stroke-width="0.7" fill="none" opacity="0.5" filter="url(#lineGlow)"/>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- CARD 1: DASHBOARD (center, largest) -->
  <!-- Composite 3D: slight tilt via transform -->
  <!-- ─────────────────────────────────────────────────────── -->
  <g transform="translate(270, 218)" filter="url(#cardShadow)">

    <!-- Card depth: bottom edge (dark strip) -->
    <rect x="5" y="218" width="360" height="10" rx="0" fill="#020a06" opacity="0.7"/>
    <!-- Card depth: right edge -->
    <rect x="358" y="5" width="10" height="215" rx="0" fill="#011a0d" opacity="0.6"/>

    <!-- Card face -->
    <rect x="0" y="0" width="360" height="220" rx="16" fill="url(#glassGrad)"/>
    <rect x="0" y="0" width="360" height="220" rx="16" fill="#1a1a1a" opacity="0.85"/>
    <!-- Glass shine -->
    <rect x="0" y="0" width="360" height="220" rx="16" fill="url(#shineGrad)"/>
    <!-- Border -->
    <rect x="0" y="0" width="360" height="220" rx="16" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>
    <!-- Top accent line -->
    <rect x="16" y="0" width="90" height="1.5" rx="1" fill="#02cc81" opacity="0.8"/>

    <!-- Card content (clipped) -->
    <g clip-path="url(#dashClip)">
      <!-- Header row -->
      <text x="18" y="26" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" fill="rgba(255,255,255,0.4)" letter-spacing="1">PREGLED POSLOVANJA</text>

      <!-- Main revenue number -->
      <text x="18" y="56" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="-0.5">€ 12,840</text>

      <!-- Trend badge -->
      <rect x="175" y="40" width="62" height="20" rx="10" fill="rgba(2,204,129,0.18)"/>
      <text x="196" y="53.5" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#02cc81">↑ 14.2%</text>

      <!-- Sub label -->
      <text x="18" y="72" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">ovaj mesec</text>

      <!-- Divider -->
      <line x1="18" y1="84" x2="342" y2="84" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

      <!-- Graph area (86 → 196 y, 18 → 342 x) -->
      <!-- Graph fill area -->
      <path d="M 18 168 L 55 155 L 100 160 L 145 140 L 185 130 L 225 108 L 265 98 L 310 80 L 342 72 L 342 196 L 18 196 Z" fill="url(#graphFill)"/>

      <!-- Graph line -->
      <path d="M 18 168 L 55 155 L 100 160 L 145 140 L 185 130 L 225 108 L 265 98 L 310 80 L 342 72" stroke="url(#graphGrad)" stroke-width="2" fill="none" filter="url(#lineGlow)" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Graph line duplicate for glow -->
      <path d="M 18 168 L 55 155 L 100 160 L 145 140 L 185 130 L 225 108 L 265 98 L 310 80 L 342 72" stroke="#02cc81" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Graph dot at peak -->
      <circle cx="342" cy="72" r="4.5" fill="#02cc81" filter="url(#lineGlow)"/>
      <circle cx="342" cy="72" r="2.5" fill="#ffffff"/>

      <!-- X axis ticks (month labels) -->
      <text x="18" y="212" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.25)">Jul</text>
      <text x="96" y="212" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.25)">Avg</text>
      <text x="175" y="212" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.25)">Sep</text>
      <text x="254" y="212" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.25)">Okt</text>
      <text x="325" y="212" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.25)">Nov</text>
    </g>
  </g>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- CARD 2: CUSTOMER PROFILE (upper right) -->
  <!-- ─────────────────────────────────────────────────────── -->
  <g transform="translate(770, 178)" filter="url(#cardShadow)">
    <!-- Depth edges -->
    <rect x="4" y="146" width="208" height="8" rx="0" fill="#020a06" opacity="0.65"/>
    <rect x="206" y="4" width="8" height="144" rx="0" fill="#011a0d" opacity="0.55"/>

    <!-- Card face -->
    <rect x="0" y="0" width="208" height="148" rx="14" fill="#1c1c1e" opacity="0.9"/>
    <rect x="0" y="0" width="208" height="148" rx="14" fill="url(#glassGrad)"/>
    <rect x="0" y="0" width="208" height="148" rx="14" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <!-- Top accent -->
    <rect x="14" y="0" width="60" height="1.5" rx="1" fill="#02cc81" opacity="0.7"/>

    <g clip-path="url(#profileClip)">
      <!-- Label -->
      <text x="16" y="22" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="500" fill="rgba(255,255,255,0.38)" letter-spacing="1">KUPAC</text>

      <!-- Avatar circle -->
      <circle cx="38" cy="62" r="20" fill="url(#avatarGrad)"/>
      <!-- Avatar initials -->
      <text x="38" y="66.5" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">MP</text>
      <!-- Avatar ring -->
      <circle cx="38" cy="62" r="20" fill="none" stroke="#02cc81" stroke-width="1.5" opacity="0.6"/>
      <!-- Online dot -->
      <circle cx="53" cy="47" r="5" fill="#0e0e0e"/>
      <circle cx="53" cy="47" r="3.5" fill="#02cc81"/>
      <circle cx="53" cy="47" r="3.5" fill="#02cc81" filter="url(#lineGlow)"/>

      <!-- Name & company -->
      <text x="66" y="56" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Marko Popović</text>
      <text x="66" y="72" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Popović Gradnja</text>

      <!-- Divider -->
      <line x1="16" y1="92" x2="192" y2="92" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

      <!-- Stats row -->
      <text x="16" y="110" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">Porudžbine</text>
      <text x="16" y="124" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">47</text>

      <text x="82" y="110" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">Ukupno</text>
      <text x="82" y="124" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">€ 8,340</text>

      <!-- Status badge -->
      <rect x="153" y="100" width="42" height="18" rx="9" fill="rgba(2,204,129,0.2)"/>
      <circle cx="163" cy="109" r="3" fill="#02cc81"/>
      <text x="170" y="112.5" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#02cc81">Aktivan</text>
    </g>
  </g>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- CARD 3: INVOICE (lower right) -->
  <!-- ─────────────────────────────────────────────────────── -->
  <g transform="translate(762, 378)" filter="url(#cardShadow)">
    <!-- Depth edges -->
    <rect x="4" y="238" width="196" height="8" rx="0" fill="#020a06" opacity="0.65"/>
    <rect x="194" y="4" width="8" height="236" rx="0" fill="#011a0d" opacity="0.55"/>

    <!-- Card face -->
    <rect x="0" y="0" width="196" height="240" rx="14" fill="#1c1c1e" opacity="0.92"/>
    <rect x="0" y="0" width="196" height="240" rx="14" fill="url(#glassGrad)"/>
    <rect x="0" y="0" width="196" height="240" rx="14" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <!-- Top accent -->
    <rect x="14" y="0" width="50" height="1.5" rx="1" fill="#02cc81" opacity="0.7"/>

    <g clip-path="url(#invoiceClip)">
      <!-- Label -->
      <text x="16" y="22" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="500" fill="rgba(255,255,255,0.38)" letter-spacing="1">FAKTURA</text>

      <!-- Invoice number -->
      <text x="16" y="40" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">#0042</text>
      <!-- Date -->
      <text x="130" y="40" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.35)" text-anchor="end">24. Feb 2026</text>

      <!-- Divider -->
      <line x1="16" y1="50" x2="180" y2="50" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

      <!-- Line items -->
      <text x="16" y="68" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">Prozori 2×2m (×3)</text>
      <text x="178" y="68" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="end">€ 2,400</text>

      <text x="16" y="84" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">Montaža</text>
      <text x="178" y="84" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="end">€ 600</text>

      <text x="16" y="100" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">Zaptivačka masa</text>
      <text x="178" y="100" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="end">€ 200</text>

      <!-- Divider -->
      <line x1="16" y1="112" x2="180" y2="112" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

      <!-- Total -->
      <text x="16" y="128" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="rgba(255,255,255,0.8)">Ukupno</text>
      <text x="178" y="128" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="end">€ 3,200</text>

      <!-- Divider -->
      <line x1="16" y1="140" x2="180" y2="140" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

      <!-- ── PAID STAMP ── -->
      <g transform="translate(98, 188) rotate(-12)">
        <!-- Stamp outer border -->
        <rect x="-46" y="-22" width="92" height="44" rx="6" fill="none" stroke="#02cc81" stroke-width="2.5" opacity="0.85"/>
        <!-- Stamp inner border -->
        <rect x="-42" y="-18" width="84" height="36" rx="4" fill="none" stroke="#02cc81" stroke-width="1" opacity="0.45"/>
        <!-- Stamp text -->
        <text x="0" y="7" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#02cc81" text-anchor="middle" letter-spacing="3" opacity="0.92">PAID</text>
      </g>
      <!-- Stamp glow -->
      <g transform="translate(98, 188) rotate(-12)" filter="url(#lineGlow)">
        <rect x="-46" y="-22" width="92" height="44" rx="6" fill="none" stroke="#02cc81" stroke-width="1.5" opacity="0.4"/>
      </g>

      <!-- Customer label -->
      <text x="16" y="228" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.3)">Popović Gradnja</text>
    </g>
  </g>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- SMALL FLOATING METRIC PILLS (extra detail) -->
  <!-- ─────────────────────────────────────────────────────── -->

  <!-- Pill: Active orders -->
  <g transform="translate(245, 474)">
    <rect x="0" y="0" width="148" height="40" rx="20" fill="#1a1a1a" opacity="0.9"/>
    <rect x="0" y="0" width="148" height="40" rx="20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="22" cy="20" r="12" fill="rgba(2,204,129,0.15)"/>
    <text x="22" y="24.5" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#02cc81" text-anchor="middle">📦</text>
    <text x="42" y="16" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">Aktivne</text>
    <text x="42" y="29" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">23</text>
  </g>

  <!-- Pill: Revenue today -->
  <g transform="translate(246, 524)">
    <rect x="0" y="0" width="148" height="40" rx="20" fill="#1a1a1a" opacity="0.9"/>
    <rect x="0" y="0" width="148" height="40" rx="20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="22" cy="20" r="12" fill="rgba(2,204,129,0.15)"/>
    <text x="22" y="24.5" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#02cc81" text-anchor="middle">€</text>
    <text x="42" y="16" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">Danas</text>
    <text x="42" y="29" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">€ 840</text>
    <!-- Mini up arrow badge -->
    <rect x="105" y="11" width="34" height="16" rx="8" fill="rgba(2,204,129,0.18)"/>
    <text x="122" y="22.5" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#02cc81" text-anchor="middle">↑ 8%</text>
  </g>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- Floating ambient particles -->
  <!-- ─────────────────────────────────────────────────────── -->
  <circle cx="230" cy="300" r="1.5" fill="#02cc81" opacity="0.5" filter="url(#lineGlow)"/>
  <circle cx="150" cy="420" r="1" fill="#02cc81" opacity="0.35"/>
  <circle cx="1020" cy="520" r="1.5" fill="#02cc81" opacity="0.45" filter="url(#lineGlow)"/>
  <circle cx="1050" cy="300" r="1" fill="#02cc81" opacity="0.3"/>
  <circle cx="200" cy="180" r="1" fill="#ffffff" opacity="0.15"/>
  <circle cx="700" cy="150" r="1.5" fill="#ffffff" opacity="0.12"/>
  <circle cx="1100" cy="600" r="1" fill="#02cc81" opacity="0.3"/>
  <circle cx="420" cy="570" r="1.2" fill="#02cc81" opacity="0.4" filter="url(#lineGlow)"/>

  <!-- Subtle horizontal scan line at top edge of cards -->
  <rect x="270" y="217" width="360" height="1" rx="0.5" fill="#02cc81" opacity="0.12"/>

</svg>
