<svg viewBox="0 0 500 580" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Grain texture -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Green glow for lines -->
    <filter id="lineGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Green orb glow -->
    <filter id="orbGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>

    <!-- Drop shadow for cards -->
    <filter id="cardShadow" x="-15%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Gradient for graph line -->
    <linearGradient id="graphGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#02cc81" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#02cc81" stop-opacity="1"/>
    </linearGradient>

    <!-- Graph fill gradient -->
    <linearGradient id="graphFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#02cc81" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#02cc81" stop-opacity="0"/>
    </linearGradient>

    <!-- Card glass gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>

    <!-- Shine gradient -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Avatar gradient -->
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02cc81" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a8f5e" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Clip paths -->
    <clipPath id="dashClipM">
      <rect x="0" y="0" width="380" height="210" rx="16"/>
    </clipPath>
    <clipPath id="profileClipM">
      <rect x="0" y="0" width="180" height="130" rx="13"/>
    </clipPath>
    <clipPath id="invoiceClipM">
      <rect x="0" y="0" width="172" height="208" rx="13"/>
    </clipPath>
  </defs>

  <!-- ── Background ─────────────────────────────────────────── -->
  <rect width="500" height="580" fill="#0e0e0e"/>
  <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%">
    <stop offset="0%" stop-color="#1a1a1a"/>
    <stop offset="100%" stop-color="#0a0a0a"/>
  </radialGradient>
  <rect width="500" height="580" fill="url(#bgGrad)"/>

  <!-- Grain -->
  <rect width="500" height="580" fill="#888" opacity="0.042" filter="url(#grain)"/>

  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="0.6" fill="#ffffff" opacity="0.07"/>
  </pattern>
  <rect width="500" height="580" fill="url(#dots)"/>

  <!-- ── Ambient glow orbs ─────────────────────────────────── -->
  <ellipse cx="250" cy="270" rx="220" ry="180" fill="#02cc81" opacity="0.05" filter="url(#orbGlow)"/>
  <ellipse cx="120" cy="480" rx="130" ry="100" fill="#02cc81" opacity="0.035" filter="url(#orbGlow)"/>
  <ellipse cx="410" cy="120" rx="110" ry="90" fill="#02cc81" opacity="0.04" filter="url(#orbGlow)"/>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- NEON CONNECTING LINES -->
  <!-- ─────────────────────────────────────────────────────── -->

  <!-- Line: Dashboard → Profile (bottom-left of dash to top of profile) -->
  <path d="M 90 260 C 85 300, 80 320, 78 340" stroke="#02cc81" stroke-width="0.9" fill="none" opacity="0.85" filter="url(#lineGlow)"/>
  <path d="M 90 260 C 85 300, 80 320, 78 340" stroke="#02cc81" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- Line: Dashboard → Invoice (bottom-right of dash to top of invoice) -->
  <path d="M 340 258 C 348 295, 348 318, 345 340" stroke="#02cc81" stroke-width="0.9" fill="none" opacity="0.8" filter="url(#lineGlow)"/>
  <path d="M 340 258 C 348 295, 348 318, 345 340" stroke="#02cc81" stroke-width="0.5" fill="none" opacity="0.38"/>

  <!-- Connection nodes -->
  <circle cx="90" cy="260" r="4.5" fill="#02cc81" opacity="0.9" filter="url(#lineGlow)"/>
  <circle cx="90" cy="260" r="2" fill="#ffffff" opacity="0.95"/>
  <circle cx="340" cy="258" r="4.5" fill="#02cc81" opacity="0.9" filter="url(#lineGlow)"/>
  <circle cx="340" cy="258" r="2" fill="#ffffff" opacity="0.95"/>
  <circle cx="78" cy="340" r="3.5" fill="#02cc81" opacity="0.8" filter="url(#lineGlow)"/>
  <circle cx="78" cy="340" r="1.8" fill="#ffffff" opacity="0.9"/>
  <circle cx="345" cy="340" r="3.5" fill="#02cc81" opacity="0.8" filter="url(#lineGlow)"/>
  <circle cx="345" cy="340" r="1.8" fill="#ffffff" opacity="0.9"/>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- CARD 1: DASHBOARD (top center, wide) -->
  <!-- ─────────────────────────────────────────────────────── -->
  <g transform="translate(60, 50)" filter="url(#cardShadow)">
    <!-- Depth edges -->
    <rect x="5" y="208" width="380" height="9" rx="0" fill="#010806" opacity="0.75"/>
    <rect x="378" y="5" width="9" height="205" rx="0" fill="#010e07" opacity="0.65"/>

    <!-- Card face -->
    <rect x="0" y="0" width="380" height="210" rx="16" fill="#1a1a1a" opacity="0.9"/>
    <rect x="0" y="0" width="380" height="210" rx="16" fill="url(#glassGrad)"/>
    <rect x="0" y="0" width="380" height="210" rx="16" fill="url(#shineGrad)"/>
    <rect x="0" y="0" width="380" height="210" rx="16" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <!-- Top accent -->
    <rect x="16" y="0" width="80" height="1.5" rx="1" fill="#02cc81" opacity="0.8"/>

    <g clip-path="url(#dashClipM)">
      <!-- Header -->
      <text x="18" y="24" font-family="Inter, system-ui, sans-serif" font-size="8.5" font-weight="500" fill="rgba(255,255,255,0.38)" letter-spacing="1.2">PREGLED POSLOVANJA</text>

      <!-- Revenue -->
      <text x="18" y="52" font-family="Inter, system-ui, sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="-0.5">€ 12,840</text>

      <!-- Trend badge -->
      <rect x="184" y="37" width="62" height="20" rx="10" fill="rgba(2,204,129,0.17)"/>
      <text x="204" y="50.5" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#02cc81">↑ 14.2%</text>

      <text x="18" y="68" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.32)">ovaj mesec</text>

      <!-- Divider -->
      <line x1="18" y1="80" x2="362" y2="80" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

      <!-- Graph area (82 → 196 y) -->
      <path d="M 18 162 L 53 152 L 97 157 L 143 138 L 182 128 L 222 108 L 262 96 L 305 78 L 362 66 L 362 196 L 18 196 Z" fill="url(#graphFill)"/>
      <path d="M 18 162 L 53 152 L 97 157 L 143 138 L 182 128 L 222 108 L 262 96 L 305 78 L 362 66" stroke="url(#graphGrad)" stroke-width="2" fill="none" filter="url(#lineGlow)" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 18 162 L 53 152 L 97 157 L 143 138 L 182 128 L 222 108 L 262 96 L 305 78 L 362 66" stroke="#02cc81" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Peak dot -->
      <circle cx="362" cy="66" r="4.5" fill="#02cc81" filter="url(#lineGlow)"/>
      <circle cx="362" cy="66" r="2.5" fill="#ffffff"/>

      <!-- Month labels -->
      <text x="18" y="208" font-family="Inter, system-ui, sans-serif" font-size="7" fill="rgba(255,255,255,0.22)">Jul</text>
      <text x="95" y="208" font-family="Inter, system-ui, sans-serif" font-size="7" fill="rgba(255,255,255,0.22)">Avg</text>
      <text x="174" y="208" font-family="Inter, system-ui, sans-serif" font-size="7" fill="rgba(255,255,255,0.22)">Sep</text>
      <text x="252" y="208" font-family="Inter, system-ui, sans-serif" font-size="7" fill="rgba(255,255,255,0.22)">Okt</text>
      <text x="346" y="208" font-family="Inter, system-ui, sans-serif" font-size="7" fill="rgba(255,255,255,0.22)">Nov</text>
    </g>
  </g>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- CARD 2: CUSTOMER PROFILE (lower left) -->
  <!-- ─────────────────────────────────────────────────────── -->
  <g transform="translate(56, 310)" filter="url(#cardShadow)">
    <!-- Depth -->
    <rect x="4" y="128" width="180" height="7" rx="0" fill="#010806" opacity="0.65"/>
    <rect x="178" y="4" width="7" height="126" rx="0" fill="#010e07" opacity="0.55"/>

    <!-- Card face -->
    <rect x="0" y="0" width="180" height="130" rx="13" fill="#1c1c1e" opacity="0.92"/>
    <rect x="0" y="0" width="180" height="130" rx="13" fill="url(#glassGrad)"/>
    <rect x="0" y="0" width="180" height="130" rx="13" fill="none" stroke="rgba(255,255,255,0.11)" stroke-width="1"/>
    <rect x="14" y="0" width="55" height="1.5" rx="1" fill="#02cc81" opacity="0.7"/>

    <g clip-path="url(#profileClipM)">
      <text x="14" y="20" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="500" fill="rgba(255,255,255,0.35)" letter-spacing="1">KUPAC</text>

      <!-- Avatar -->
      <circle cx="32" cy="54" r="17" fill="url(#avatarGrad)"/>
      <text x="32" y="58" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">MP</text>
      <circle cx="32" cy="54" r="17" fill="none" stroke="#02cc81" stroke-width="1.5" opacity="0.55"/>
      <circle cx="45" cy="40" r="4.5" fill="#0e0e0e"/>
      <circle cx="45" cy="40" r="3" fill="#02cc81" filter="url(#lineGlow)"/>

      <!-- Name -->
      <text x="56" y="49" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Marko Popović</text>
      <text x="56" y="64" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.38)">Popović Gradnja</text>

      <!-- Divider -->
      <line x1="14" y1="80" x2="166" y2="80" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

      <!-- Stats -->
      <text x="14" y="98" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.32)">Porudžbine</text>
      <text x="14" y="115" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff">47</text>

      <text x="70" y="98" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.32)">Ukupno</text>
      <text x="70" y="115" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff">€ 8,340</text>
    </g>
  </g>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- CARD 3: INVOICE (lower right) -->
  <!-- ─────────────────────────────────────────────────────── -->
  <g transform="translate(264, 310)" filter="url(#cardShadow)">
    <!-- Depth -->
    <rect x="4" y="206" width="172" height="7" rx="0" fill="#010806" opacity="0.65"/>
    <rect x="170" y="4" width="7" height="204" rx="0" fill="#010e07" opacity="0.55"/>

    <!-- Card face -->
    <rect x="0" y="0" width="172" height="208" rx="13" fill="#1c1c1e" opacity="0.92"/>
    <rect x="0" y="0" width="172" height="208" rx="13" fill="url(#glassGrad)"/>
    <rect x="0" y="0" width="172" height="208" rx="13" fill="none" stroke="rgba(255,255,255,0.11)" stroke-width="1"/>
    <rect x="14" y="0" width="45" height="1.5" rx="1" fill="#02cc81" opacity="0.7"/>

    <g clip-path="url(#invoiceClipM)">
      <text x="14" y="20" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="500" fill="rgba(255,255,255,0.35)" letter-spacing="1">FAKTURA</text>

      <text x="14" y="37" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">#0042</text>
      <text x="158" y="37" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="end">24. Feb 2026</text>

      <line x1="14" y1="46" x2="158" y2="46" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

      <text x="14" y="62" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.55)">Prozori 2×2m (×3)</text>
      <text x="158" y="62" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.55)" text-anchor="end">€ 2,400</text>

      <text x="14" y="78" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.55)">Montaža</text>
      <text x="158" y="78" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.55)" text-anchor="end">€ 600</text>

      <text x="14" y="94" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.55)">Zaptivačka masa</text>
      <text x="158" y="94" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.55)" text-anchor="end">€ 200</text>

      <line x1="14" y1="106" x2="158" y2="106" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

      <text x="14" y="122" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.75)">Ukupno</text>
      <text x="158" y="122" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="end">€ 3,200</text>

      <line x1="14" y1="134" x2="158" y2="134" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

      <!-- PAID stamp -->
      <g transform="translate(86, 168) rotate(-12)">
        <rect x="-40" y="-20" width="80" height="40" rx="6" fill="none" stroke="#02cc81" stroke-width="2.5" opacity="0.88"/>
        <rect x="-36" y="-16" width="72" height="32" rx="4" fill="none" stroke="#02cc81" stroke-width="1" opacity="0.42"/>
        <text x="0" y="6" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#02cc81" text-anchor="middle" letter-spacing="2" opacity="0.9">PAID</text>
      </g>
      <g transform="translate(86, 168) rotate(-12)" filter="url(#lineGlow)">
        <rect x="-40" y="-20" width="80" height="40" rx="6" fill="none" stroke="#02cc81" stroke-width="1.5" opacity="0.38"/>
      </g>

      <text x="14" y="200" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.28)">Popović Gradnja</text>
    </g>
  </g>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- Floating particles -->
  <!-- ─────────────────────────────────────────────────────── -->
  <circle cx="40" cy="280" r="1.5" fill="#02cc81" opacity="0.45" filter="url(#lineGlow)"/>
  <circle cx="460" cy="280" r="1.2" fill="#02cc81" opacity="0.4" filter="url(#lineGlow)"/>
  <circle cx="250" cy="530" r="1.3" fill="#02cc81" opacity="0.35" filter="url(#lineGlow)"/>
  <circle cx="150" cy="160" r="1" fill="#ffffff" opacity="0.12"/>
  <circle cx="380" cy="480" r="1" fill="#02cc81" opacity="0.3"/>
  <circle cx="28" cy="130" r="0.8" fill="#ffffff" opacity="0.1"/>
</svg>
